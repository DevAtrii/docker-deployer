name: "Build Packages"

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Backend Archive
        run: zip -r docker-deployer-backend.zip backend/

      - name: Prepare Frontend Archive
        run: |
          zip -r docker-deployer-frontend.zip . \
            -x "backend/*" ".git/*" "node_modules/*" ".next/*" \
            "*.zip" ".gitignore" "package-lock.json"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            docker-deployer-backend.zip
            docker-deployer-frontend.zip
          tag_name: latest
          name: "Latest Build"
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
