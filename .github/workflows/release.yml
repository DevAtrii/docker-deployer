name: "Build Packages"

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to fetch tags

      - name: Determine Next Version
        id: versioning
        run: |
          # Fetch all tags
          git fetch --tags
          
          # Find the latest auto-increment tag
          LATEST_TAG=$(git tag -l "v*-auto" | sort -V | tail -n1)
          
          if [ -z "$LATEST_TAG" ]; then
            NEW_VERSION=1
          else
            # Extract number from vXX-auto
            CURRENT_VERSION=$(echo $LATEST_TAG | sed 's/v//' | sed 's/-auto//')
            NEW_VERSION=$((CURRENT_VERSION + 1))
          fi
          
          echo "tag=v${NEW_VERSION}-auto" >> $GITHUB_OUTPUT
          echo "Generated new tag: v${NEW_VERSION}-auto"

      - name: Prepare Backend Archive
        run: zip -r docker-deployer-backend.zip backend/

      - name: Prepare Frontend Archive
        run: |
          zip -r docker-deployer-frontend.zip . \
            -x "backend/*" ".git/*" "node_modules/*" ".next/*" \
            "*.zip" ".gitignore" "package-lock.json"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            docker-deployer-backend.zip
            docker-deployer-frontend.zip
          tag_name: ${{ steps.versioning.outputs.tag }}
          name: "Auto Build ${{ steps.versioning.outputs.tag }}"
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
