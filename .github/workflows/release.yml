name: "Publish Release"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Type Check
        run: npx tsc --noEmit

      - name: Prepare Backend Archive
        run: zip -r docker-deployer-backend.zip backend/

      - name: Prepare Frontend Archive
        run: |
          zip -r docker-deployer-frontend.zip . \
            -x "backend/*" ".git/*" "node_modules/*" ".next/*" \
            "*.zip" ".gitignore" "package-lock.json"

      - name: Prepare Full Source Archive
        run: git archive -o docker-deployer-full-source.zip HEAD

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            docker-deployer-backend.zip
            docker-deployer-frontend.zip
            docker-deployer-full-source.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
